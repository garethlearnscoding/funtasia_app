<!doctype html>
<html lang="en" class="mocha"> <!--Default to dark theme which follows the script-->
  <head>
    <script>
      // Immediate theme sync to avoid flashing
      const savedTheme = localStorage.getItem('funtasia-theme') || 'mocha'; // Default to mocha
      document.documentElement.classList.remove('mocha');
      document.documentElement.classList.remove('latte');
      document.documentElement.classList.add(savedTheme);
    </script>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Funtasia 3D Map</title>
    <link rel="stylesheet" href="/src/css/main.css"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/src/css/input.css" rel="stylesheet"/>
    <script type="module" src="/src/js/helper/pwa.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg"/>
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png"/>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="floor-selector">
      <div id="floor-thumb"></div>
      <button class="floor-btn" data-floor="l4">L4</button>
      <button class="floor-btn" data-floor="l3">L3</button>
      <button class="floor-btn" data-floor="l2">L2</button>
      <button class="floor-btn" data-floor="l1">L1</button>
      <button class="floor-btn" data-floor="b1">B1</button>
      <button class="floor-btn" data-floor="b2">B2</button>
      <button class="floor-btn" data-floor="b3">B3</button>
    </div>

    <div id="bottom-sheet">
      <div id="sheet-handle"></div>
      <button id="close-btn">&times;</button>
      <h2 id="sheet-title">Location Title</h2>
      <p id="sheet-desc">Location description will appear here.</p>
      <button class="bg-ctp-surface1 text-ctp-text" id="enter-child-btn">Enter Level</button>
    </div>

    <button class="bg-ctp-surface1 text-ctp-text" id="exit-child-btn">
      <span class="material-symbols-outlined text-[18px]">logout</span> Exit Level
    </button>

    <div id="toast-popup" class="toast">
      <span id="toast-message"></span>
    </div>

    <button id="open-settings-btn" class="fab-btn">
      <span class="material-symbols-outlined">settings</span>
    </button>

    <button id="open-directory-btn" class="fab-btn">
      <span class="material-symbols-outlined">menu_book</span>
    </button>

     <button id="open-qr-btn" class="fab-btn">
      <span class="material-symbols-outlined">qr_code_scanner</span>
    </button>

     <button id="open-info-btn" class="fab-btn">
      <span class="material-symbols-outlined">info_i</span>
    </button>

    <!-- Clear Directory Marker Button (hidden by default) -->
    <button id="clear-directory-marker-btn" class="fab-btn" style="display: none;">
      <span class="material-symbols-outlined">close</span>
    </button>

    <div id="settings-modal-wrapper" class="modal-wrapper">
      <div class="modal-container" style="position: fixed; inset: 0;">
        <div class="modal-backdrop" id="settings-modal-backdrop"></div>
        <div class="modal-card">
          <!-- Header Section -->
          <div class="modal-header">
            <div>
              <h1 class="modal-title">Settings</h1>
              <p class="modal-subtitle">Configure your experience</p>
            </div>
            <button class="modal-close-btn" id="close-settings-btn">
              <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
          </div>
          <!-- Content Area -->
          <div class="modal-content" id="settings-content-area">
          </div>
          <div class="modal-footer-fade"></div>
        </div>
      </div>
    </div>

    <div id="directory-modal-wrapper" class="modal-wrapper">
      <div class="modal-container" style="position: fixed; inset: 0;">
        <div class="modal-backdrop" id="directory-modal-backdrop"></div>
        <div class="modal-card">
          <!-- Header Section -->
          <div class="modal-header">
            <div>
              <h1 class="modal-title">Directory</h1>
              <p class="modal-subtitle">Explore active exhibitions and zones</p>
            </div>
            <button class="modal-close-btn" id="close-directory-btn">
              <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
          </div>
          <!-- Content Area -->
          <div class="modal-content">
            <!-- Search -->
            <div class="px-4 mb-4">
              <div class="modal-search-wrapper">
                <div class="modal-search-icon-wrapper">
                  <span class="modal-search-icon">search</span>
                </div>
                <input id="directory-search-input" class="modal-search-input" placeholder="Search for a location..." type="text"/>
              </div>
            </div>

            <!-- Filter Section (always visible) -->
            <div class="filter-section" id="directory-filter-section">
              <div class="filter-header">
                <span class="filter-label">Filters</span>
                <button class="filter-clear-btn" id="filter-clear-all-btn">Clear All</button>
              </div>
              <!-- Level & Zone dropdowns -->
              <div class="filter-row">
                <select id="filter-level" class="filter-dropdown">
                  <option value="">All Levels</option>
                  <option value="b3">B3</option>
                  <option value="b2">B2</option>
                  <option value="b1">B1</option>
                  <option value="l1">L1</option>
                  <option value="l2">L2</option>
                </select>
                <select id="filter-zone" class="filter-dropdown">
                  <option value="">All Zones</option>
                  <option value="Yellow">Yellow</option>
                  <option value="Green">Green</option>
                  <option value="Blue">Blue</option>
                  <option value="Red">Red</option>
                  <option value="Purple">Purple</option>
                  <option value="Orange">Orange</option>
                  <option value="Brown">Brown</option>
                </select>
              </div>
              <!-- Tag chips (dynamically populated) -->
              <div class="filter-chips-container" id="filter-tags-container">
                <!-- Chips inserted by directory.js -->
              </div>
            </div>
            <div class="filter-divider"></div>

            <!-- Section: Funtasia Directory -->
            <section>
              <div id="funtasia-directory-list" class="space-y-6">
                <!-- Dynamically populated via directory.js -->
              </div>
            </section>
          </div>
          <!-- Footer Action Fade -->
          <div class="modal-footer-fade"></div>
        </div>
      </div>
    </div>

    <div id="qr-modal-wrapper" class="modal-wrapper">
      <div class="modal-container fixed inset-0">
        <div class="modal-backdrop" id="qr-modal-backdrop"></div>
        <div class="modal-card">
          <!-- Header Section -->
          <div class="modal-header">
            <div>
              <h1 class="modal-title">Scan Location QR</h1>
              <p class="modal-subtitle">Identify your location</p>
            </div>
            <button class="modal-close-btn" id="close-qr-btn">
              <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
          </div>
          <!-- Content Area -->
          <div class="modal-content flex flex-col items-center p-6">
            
            <!-- Toggle Buttons -->
            <div id="qr-toggle-selector-container">
              <button id="qr-toggle-btn" class="qr-toggle-selector" style="background: var(--color-ctp-mauve); color: var(--color-ctp-base)">
                <span class="material-symbols-outlined text-[18px]">qr_code_scanner</span>
                QR Code
              </button>
              <button id="text-toggle-btn" class="qr-toggle-selector">
                <span class="material-symbols-outlined text-[18px]">keyboard</span>
                Text Input
              </button>
            </div>

            <!-- QR Scanner View -->
            <div id="qr-scanner-view">
              <p>Align within frame</p>
              <!-- Scanner Placeholder Square -->
              <div id="qrcode_scanner">
                <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.4;">qr_code_scanner</span>
              </div>
              <button id="qr-flash-btn">
                <span class="material-symbols-outlined text-[20px]" id="qr-flash-icon">flashlight_off</span>
                Toggle Flash
              </button>
            </div>

            <!-- Text Input View (Hidden by default) -->
            <div id="text-input-view" class="hidden flex-col items-center" style="width: 100%;">
              <p class="uppercase font-bold mb-5" style="font-size: 11px; letter-spacing: 0.1em;">Enter location code</p>
              
              <!-- Location Code Input Fields -->
              <div class="flex mb-8 gap-2 justify-center items-center" style="width: 100%;">
                <input class="qr-code-input" inputmode="numeric" maxlength="2" type="text" placeholder="00"/>
                <span class="font-bold" style="font-size: 24px;">-</span>
                <input class="qr-code-input" inputmode="numeric" maxlength="2" type="text" placeholder="00"/>
              </div>
              <button id="qr-go-btn">Visit location</button>
            </div>

          </div>
          <div class="modal-footer-fade"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { startScanner, stopScanner, toggleTorch } from '/src/js/helper/qrScanner.js';
      import { Navigation } from '/src/js/events/navigation.js';
      import { QRMarker } from '/src/js/marker/qrmarker.js';
      import { showToast } from '/src/js/ui_ux/ui.js';
      const openDirBtn = document.getElementById('open-directory-btn');
      const closeDirBtn = document.getElementById('close-directory-btn');
      const dirModal = document.getElementById('directory-modal-wrapper');
      const dirBackdrop = document.getElementById('directory-modal-backdrop');

      const openSettingsBtn = document.getElementById('open-settings-btn');
      const closeSettingsBtn = document.getElementById('close-settings-btn');
      const settingsModal = document.getElementById('settings-modal-wrapper');
      const settingsBackdrop = document.getElementById('settings-modal-backdrop');

      const openQrBtn = document.getElementById('open-qr-btn');
      const openInfoBtn = document.getElementById('open-info-btn');

      const qrModal = document.getElementById('qr-modal-wrapper');
      const qrBackdrop = document.getElementById('qr-modal-backdrop');
      const closeQrBtn = document.getElementById('close-qr-btn');

      const qrToggleBtn = document.getElementById('qr-toggle-btn');
      const textToggleBtn = document.getElementById('text-toggle-btn');
      const qrScannerView = document.getElementById('qr-scanner-view');
      const textInputView = document.getElementById('text-input-view');
      const qrFlashBtn = document.getElementById('qr-flash-btn');
      const qrFlashIcon = document.getElementById('qr-flash-icon');
      

      function hideFabButtons() {
        openDirBtn.style.display = 'none';
        openSettingsBtn.style.display = 'none';
        openQrBtn.style.display = 'none';
        openInfoBtn.style.display = 'none';
      }

      function showFabButtons() {
        openDirBtn.style.display = 'flex';
        openSettingsBtn.style.display = 'flex';
        openQrBtn.style.display = 'flex';
        openInfoBtn.style.display = 'flex';
      }

      function clearTextInputs() {
        const inputs = document.querySelectorAll('.qr-code-input');
        inputs.forEach(input => input.value = '');
      }

      function handleQRSuccess(decodedText) {
          try {
              const url = new URL(decodedText);
              const qrID = url.searchParams.get('qrID');
              if (qrID) {
                  stopScanner();
                  
                  // Update URL via pushState to avoid page reload
                  const currentUrl = new URL(window.location.href);
                  currentUrl.searchParams.set('qrID', qrID);
                  window.history.pushState({}, '', currentUrl.toString());
                  
                  // Trigger navigation
                  Navigation.handleQRID(qrID);
                  
                  // Close modal
                  document.getElementById('qr-modal-wrapper').style.display = 'none';
                  showFabButtons();
                  clearTextInputs();
              }
          } catch(e) {
              console.error("Invalid QR Code structure", decodedText);
          }
      }

      // Modals
      openDirBtn.addEventListener('click', () => {
        dirModal.style.display = 'block';
        hideFabButtons();
      });
      closeDirBtn.addEventListener('click', () => {
        dirModal.style.removeProperty('display');
        showFabButtons();
      });
      dirBackdrop.addEventListener('click', () => {
        dirModal.style.removeProperty('display');
        showFabButtons();
      });

      openSettingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'block';
        hideFabButtons();
      });
      closeSettingsBtn.addEventListener('click', () => {
        settingsModal.style.removeProperty('display');
        showFabButtons();
      });
      settingsBackdrop.addEventListener('click', () => {
        settingsModal.style.removeProperty('display');
        showFabButtons();
      });

      openQrBtn.addEventListener('click', () => {
        qrModal.style.display = 'block';
        hideFabButtons();
        if (qrScannerView.style.display !== 'none') {
            startScanner(handleQRSuccess);
        }
      });
      closeQrBtn.addEventListener('click', () => {
        qrModal.style.removeProperty('display');
        showFabButtons();
        stopScanner();
        clearTextInputs();
      });
      qrBackdrop.addEventListener('click', () => {
        qrModal.style.removeProperty('display');
        showFabButtons();
        stopScanner();
        clearTextInputs();
      });

      // QR / Text Toggles
      qrToggleBtn.addEventListener('click', () => {
        qrScannerView.style.display = 'flex';
        textInputView.style.display = 'none';
        
        qrToggleBtn.style.background = 'var(--color-ctp-mauve)';
        qrToggleBtn.style.color = 'var(--color-ctp-base)';

        textToggleBtn.style.background = 'transparent';
        textToggleBtn.style.color = 'var(--color-ctp-text)';
        startScanner(handleQRSuccess);
        clearTextInputs();
      });

      textToggleBtn.addEventListener('click', () => {
        qrScannerView.style.display = 'none';
        textInputView.style.display = 'flex';

        textToggleBtn.style.background = 'var(--color-ctp-mauve)';
        textToggleBtn.style.color = 'var(--color-ctp-base)';

        qrToggleBtn.style.background = 'transparent';
        qrToggleBtn.style.color = 'var(--color-ctp-text)';
        stopScanner();
      });
      
      // Flash Toggle Logic
      if (qrFlashBtn) {
        qrFlashBtn.addEventListener('click', () => {
          toggleTorch(qrFlashBtn, qrFlashIcon);
        });
      }

      // Auto-focus logic for manual input
      const inputs = document.querySelectorAll('.qr-code-input');
      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          // Allow only numbers
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          
          if (e.target.value.length === 2 && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });
      
      // Continue Button Logic for manual input
      const continueBtn = document.getElementById('qr-go-btn');
      if (continueBtn) {
        continueBtn.addEventListener('click', async () => {
          const firstVal = inputs[0].value.trim();
          const secondVal = inputs[1].value.trim();
          
          if (firstVal && secondVal) {
            // Transform first input: leading 0 → "b", leading 1 → "l"
            const firstDigit = firstVal.charAt(0);
            const restDigits = firstVal.slice(1);
            const prefix = firstDigit === '0' ? 'b' : firstDigit === '1' ? 'l' : firstDigit;
            const floorPart = `${prefix}${restDigits}`;
            const qrID = `${floorPart}-m${secondVal}`;
            console.log(`Manual input qrID: ${qrID}`);
            
            try {
              
              let targetID = qrID;
              
              // Fallback: If exact match fails, check if there's a marker that counts as a "match" (e.g. l1-m2-tc)
              // (Checking against the current floor's markers if loaded)
              const fuzzyMatch = Object.keys(QRMarker.allMarkers).find(id => id.startsWith(qrID));
              if (fuzzyMatch) {
                targetID = fuzzyMatch;
              }

              if (!QRMarker.allMarkers[targetID]) {
                showToast(`Marker ${qrID} not found.`, 2000);
                return;
              }

              // Update URL via pushState to avoid page reload
              const currentUrl = new URL(window.location.href);
              currentUrl.searchParams.set('qrID', targetID);
              window.history.pushState({}, '', currentUrl.toString());
              
              const success = await Navigation.handleQRID(targetID);
              if (success) {
                document.getElementById('qr-modal-wrapper').style.display = 'none';
                showFabButtons();
                stopScanner();
              }
              
            } catch (err) {
              console.error("Failed to process manual QR input:", err);
            }
          }
        });
      }
      
      // Clear Directory Marker Button Logic
      const clearDirMarkerBtn = document.getElementById('clear-directory-marker-btn');
      if (clearDirMarkerBtn) {
        clearDirMarkerBtn.addEventListener('click', async () => {
           // We need to clear the active directory marker from the global app state
           // Since appState isn't globally exposed on window, we can dispatch an event or import it
           // Let's import the global appState reference or just find the module
           const { Navigation } = await import('/src/js/events/navigation.js');
           const appState = Navigation.appState;
           if (appState && appState.activeDirectoryMarker) {
               appState.activeDirectoryMarker.clear();
               appState.activeDirectoryMarker = null;
               appState.activeMarkers = appState.activeMarkers.filter(m => m !== null);
           }
           clearDirMarkerBtn.style.display = 'none';

           // Also close the bottom sheet if it happens to be open
           const { hideBottomSheet } = await import('/src/js/ui_ux/ui.js');
           hideBottomSheet();
        });
      }

      // Expose for external modules if needed later
      window.openQRModal = () => openQrBtn.click();
    </script>
    <script type="module" src="/src/js/base/main.js"></script>
  </body>
</html>
