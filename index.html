<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>GLB Hover Interaction</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="info">Hover over the model</div>

    <!-- Floor Selector UI -->
    <div id="floor-selector">
      <button class="floor-btn" data-floor="l1">Floor 1</button>
      <button class="floor-btn" data-floor="l2">Floor 2</button>
      <button class="floor-btn" data-floor="l3">Floor 3</button>
    </div>

    <!-- Bottom sheet popup -->
    <div id="bottom-sheet">
      <button id="close-btn">&times;</button>
      <h2 id="sheet-title">Location Title</h2>
      <p id="sheet-desc">Location description will appear here.</p>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.172.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      // === Imports ===
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // === DOM References ===
      const container = document.getElementById("canvas-container");
      const infoLabel = document.getElementById("info");
      const sheet = document.getElementById("bottom-sheet");
      const sheetTitle = document.getElementById("sheet-title");
      const sheetDesc = document.getElementById("sheet-desc");
      const closeBtn = document.getElementById("close-btn");

      // === Helper Functions ===

      // Get viewport size, using visualViewport if available
      const getViewportSize = () => {
        if (window.visualViewport) {
          return {
            width: window.visualViewport.width,
            height: window.visualViewport.height,
          };
        }
        return {
          width: window.innerWidth,
          height: window.innerHeight,
        };
      };

      // Update mouse position from client coordinates
      function updateMousePosition(clientX, clientY) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      }

      // Update mouse from touch event
      function updateMouseFromTouch(event) {
        const touch =
          (event.touches && event.touches[0]) ||
          (event.changedTouches && event.changedTouches[0]);
        if (!touch) return;
        updateMousePosition(touch.clientX, touch.clientY);
      }

      // Determine if pointer is over UI elements
      function isPointerOverUI(event) {
        return !!event.target.closest(
          "#bottom-sheet, #close-btn, #floor-selector",
        );
      }

      // Get location data with fallback
      function getLocationInfo(objectName) {
        if (locationData[objectName]) {
          return locationData[objectName];
        }
        return {
          title: objectName
            .replace(/_/g, " ")
            .replace(/\b\w/g, (l) => l.toUpperCase()),
          description: `This is ${objectName.replace(
            /_/g,
            " ",
          )}. Click to learn more about this location.`,
        };
      }

      // === Scene Setup ===
      const scene = new THREE.Scene();

      // Background
      const textureLoader = new THREE.TextureLoader();
      textureLoader.load(
        "./assets/media/plain-background.jpeg",
        (texture) => {
          scene.background = texture;
        },
      );

      // Camera setup
      const viewportSize = getViewportSize();
      const camera = new THREE.PerspectiveCamera(
        60,
        viewportSize.width / viewportSize.height,
        0.1,
        2000,
      );
      camera.position.set(0, 0, 0);

      // Renderer
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: "high-performance",
      });
      renderer.setSize(viewportSize.width, viewportSize.height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      // === Controls ===
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.touches = {
        ONE: THREE.TOUCH.ROTATE,
        TWO: THREE.TOUCH.DOLLY_PAN,
      };
      controls.target.set(0, 0, 0);
      controls.screenSpacePanning = false;
      controls.minDistance = 3;
      controls.maxDistance = 200;
      controls.minPolarAngle = 0;
      controls.maxPolarAngle = Math.PI / 2;
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // === Lighting ===
      scene.add(new THREE.AmbientLight(0xffffff, 2));
      const dirLight = new THREE.DirectionalLight(0xffffff, 5);
      dirLight.position.set(0, 5, 0);
      scene.add(dirLight);

      // === Multi-Floor Management ===
      const loader = new GLTFLoader();
      const floors = { l1: null, l2: null, l3: null };
      const floorObjects = { l1: [], l2: [], l3: [] };
      let currentFloor = "l2"; // default floor
      let interactiveObjects = [];
      let center = new THREE.Vector3();
      let skybox = null;
      let maxRadius = 0;

      // Setup a floor model
      function setupFloorModel(floorId, gltf) {
        const model = gltf.scene;
        model.visible = false;
        scene.add(model);

        // Center model
        let box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        // Recompute bounds after centering
        box = new THREE.Box3().setFromObject(model);
        const sizeVec = box.getSize(new THREE.Vector3());
        const radius = sizeVec.length() * 0.5;
        maxRadius = Math.max(maxRadius, radius);

        // Optional skybox (currently invisible)
        if (!skybox) {
          const skyGeo = new THREE.BoxGeometry(100000, 100000, 100000);
          const skyMat = new THREE.MeshBasicMaterial({
            color: 0x000000,
            side: THREE.BackSide,
            transparent: true,
            opacity: 0,
          });
          skybox = new THREE.Mesh(skyGeo, skyMat);
          scene.add(skybox);
        }

        // Camera framing
        controls.target.set(0, 0, 0);
        camera.position.set(0, radius * 6, radius * -20);
        controls.minDistance = radius * 0.3;
        controls.maxDistance = radius * 90;
        camera.near = radius / 10000;
        camera.far = radius * 100000;
        camera.updateProjectionMatrix();
        controls.update();

        // Color Dictionary
        const mutedColors = {
          0: 0xd97c7c, // muted red
          1: 0xe6a57e, // muted orange
          2: 0x8fa7b3, // muted blue
          3: 0x8fbf9f, // muted green
          4: 0xe8e2a1, // muted yellow
          5: 0xb9a6b9, // muted purple
          6: 0xd6c1c8,
          7: 0xb1b1b1,
          8: 0xb0b0b0,
        };

        // Collect interactive meshes
        const objects = [];
        model.traverse((child) => {
          if (!child.isMesh) return;

          const isInteractive = child.userData?.INTERACTIVE === true;
          if (child.userData?.ZONE !== undefined) {
            if (!isInteractive === true) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
            child.material = new THREE.MeshStandardMaterial({
              color: mutedColors[child.userData.ZONE],
              emissive: 0x000000,
              roughness: 1,
              metalness: 1,
            });
          }

          if (!isInteractive) return; // 🚫 skip non-interactive meshes

          // if (child.userData.GREY === true) {
          //   child.material = new THREE.MeshStandardMaterial({
          //     color: 0xb1b1b1,
          //     roughness: 1,
          //     metalness: 1,
          //   });
          // }
          // if (child.userData?.FOOT === true) {
          //   child.material = new THREE.MeshStandardMaterial({
          //     color: 0xd6c1c8,
          //     roughness: 1,
          //     metalness: 0,
          //   });
          // }
          // if (child.userData?.BASE === true) {
          //   child.material = new THREE.MeshStandardMaterial({
          //     color: 0xb0b0b0,
          //     roughness: 1,
          //     metalness: 0,
          //   });
          // }

          // // Blender custom property → Three.js userData

          // child.castShadow = true;
          // child.receiveShadow = true;

          // // Clone material only for interactive meshes
          // child.material = child.material.clone();
          // child.material.map = null;
          // child.material.needsUpdate = true;
          // // Ensure standard material features
          // child.material = new THREE.MeshStandardMaterial({
          //   color: 0xffffff,
          //   emissive: 0x000000,
          //   roughness: 1,
          //   metalness: 0,
          // });

          if (!child.name || child.name === "") {
            child.name = `${floorId}_Object_${objects.length + 1}`;
          }

          objects.push(child);
        });

        floors[floorId] = model;
        floorObjects[floorId] = objects;
        console.log(`Loaded ${floorId}: ${objects.length} interactive meshes.`);

        if (floorId === currentFloor) switchFloor(floorId);
      }

      // Switch floors
      function switchFloor(floorId) {
        Object.keys(floors).forEach((id) => {
          if (floors[id]) floors[id].visible = false;
        });

        if (floors[floorId]) {
          floors[floorId].visible = true;
          interactiveObjects = floorObjects[floorId];
          currentFloor = floorId;
          console.log(`Switched to ${floorId}`);
        } else {
          console.warn(`Floor ${floorId} not loaded yet`);
        }

        // Update UI buttons
        document.querySelectorAll(".floor-btn").forEach((btn) => {
          btn.classList.remove("active");
          if (btn.dataset.floor === floorId) btn.classList.add("active");
        });

        // Reset hover
        if (hovered) {
          hovered.material.emissive.setHex(0x000000);
          hovered = null;
        }
      }

      // Load all floors
      const floorPaths = {
        l1: "./assets/models/njc-b2.glb",
        l2: "./assets/models/njc-b3.glb",
        l3: "",
      };
      let loadingCount = 0;
      const totalFloors = Object.keys(floorPaths).length;

      Object.keys(floorPaths).forEach((floorId) => {
        loader.load(
          floorPaths[floorId],
          (gltf) => {
            setupFloorModel(floorId, gltf);
            loadingCount++;
            if (loadingCount === totalFloors) {
              console.log("All floors loaded!");
              switchFloor(currentFloor);
            }
          },
          (xhr) => {
            if (xhr.lengthComputable) {
              const percentComplete = (xhr.loaded / xhr.total) * 100;
              console.log(`Loading ${floorId}: ${percentComplete.toFixed(1)}%`);
            }
          },
          (error) => {
            console.error(`Error loading ${floorId}:`, error);
          },
        );
      });

      // Floor selector button handlers
      document.querySelectorAll(".floor-btn").forEach((btn) => {
        if (btn.dataset.floor === currentFloor) btn.classList.add("active");

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const floorId = btn.dataset.floor;
          if (floors[floorId]) switchFloor(floorId);
        });
        btn.addEventListener("touchend", (e) => {
          e.stopPropagation();
          e.preventDefault();
          const floorId = btn.dataset.floor;
          if (floors[floorId]) switchFloor(floorId);
        });
      });

      // === Floating Icons Utility ===
      function addIcon(x, y, z, iconPath) {
        const texture = new THREE.TextureLoader().load(iconPath);
        const material = new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
        });
        const sprite = new THREE.Sprite(material);
        sprite.position.set(x, y, z);
        sprite.scale.set(1, 1, 1);
        scene.add(sprite);
        return sprite;
      }

      // === Bottom Sheet Logic ===
      function showBottomSheet(objectName) {
        const locationInfo = getLocationInfo(objectName);
        sheetTitle.textContent = locationInfo.title;
        sheetDesc.textContent = locationInfo.description;
        sheet.classList.add("show");
      }

      function hideBottomSheet() {
        sheet.classList.remove("show");
      }

      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        hideBottomSheet();
      });

      closeBtn.addEventListener("touchend", (e) => {
        e.stopPropagation();
        e.preventDefault();
        hideBottomSheet();
      });

      // === Raycasting & Hover Logic ===
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let hovered = null;

      function performRaycast() {
        if (!interactiveObjects || interactiveObjects.length === 0) return null;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(interactiveObjects, true);
        return intersects.length > 0 ? intersects[0].object : null;
      }

      function applyHover(target) {
        if (hovered === target) return;

        if (hovered) hovered.material.emissive.setHex(0x000000);
        hovered = target;

        if (hovered) {
          hovered.material.emissive.setHex(0xff6b00);
          document.body.style.cursor = "pointer";
          if (infoLabel) infoLabel.textContent = `Hovering: ${hovered.name}`;
        } else {
          document.body.style.cursor = "default";
          if (infoLabel) infoLabel.textContent = "Hover over the model";
        }
      }

      function handleInteraction(event) {
        if (isPointerOverUI(event)) return;

        let targetObject = hovered;
        if (!targetObject) {
          targetObject = performRaycast();
          if (targetObject) applyHover(targetObject);
        }

        if (targetObject) {
          console.log(`Clicked on: ${targetObject.name}`);
          if (infoLabel)
            infoLabel.textContent = `Clicked: ${targetObject.name}`;
          showBottomSheet(targetObject.name);
        }
      }

      // === Input Events ===
      window.addEventListener("mousemove", (event) => {
        if (isPointerOverUI(event)) return;
        updateMousePosition(event.clientX, event.clientY);
      });

      window.addEventListener(
        "touchstart",
        (event) => {
          if (isPointerOverUI(event)) return;
          updateMouseFromTouch(event);
        },
        { passive: false },
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          if (isPointerOverUI(event)) return;
          if (event.touches.length > 0) {
            updateMouseFromTouch(event);
            event.preventDefault();
          }
        },
        { passive: false },
      );

      window.addEventListener(
        "touchend",
        (event) => {
          if (isPointerOverUI(event)) return;
          updateMouseFromTouch(event);
          event.preventDefault();
          handleInteraction(event);
        },
        { passive: false },
      );

      window.addEventListener("click", handleInteraction);

      // === Animation Loop ===
      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        const elementAtPointer = document.elementFromPoint(
          ((mouse.x + 1) / 2) * window.innerWidth,
          ((-mouse.y + 1) / 2) * window.innerHeight,
        );

        const overUI =
          elementAtPointer &&
          elementAtPointer.closest(
            "#bottom-sheet, #floor-selector, #close-btn",
          );

        const intersected = overUI ? null : performRaycast();
        applyHover(intersected);

        renderer.render(scene, camera);
      }

      animate();

      // === Resize Handling ===
      function handleResize() {
        const viewportSize = getViewportSize();
        camera.aspect = viewportSize.width / viewportSize.height;
        camera.updateProjectionMatrix();
        renderer.setSize(viewportSize.width, viewportSize.height);
      }

      window.addEventListener("resize", handleResize);

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", handleResize);
        window.visualViewport.addEventListener("scroll", () => {
          window.scrollTo(0, 0);
        });
      }

      // === Location Data Placeholder ===
      const locationData = {
        // Populate with object-specific titles & descriptions
      };
      //CONSOLE FUNCTIONS
      window.printCurrentFloorInfo = function () {
        const model = floors[currentFloor];
        if (!model) {
          console.warn("No current floor model loaded.");
          return;
        }

        console.log(`=== Info for Current Floor: ${currentFloor} ===`);
        model.traverse((obj) => {
          if (obj.isMesh || Object.keys(obj.userData).length > 0 || obj.name) {
            console.group(`Object: ${obj.name || "(no name)"}`);
            console.log("Type:", obj.type);
            console.log("Position:", obj.position);
            console.log("Rotation:", obj.rotation);
            console.log("Scale:", obj.scale);
            console.log("Material:", obj.material);
            console.log("Color:", obj.material.color);
            if (obj.userData && Object.keys(obj.userData).length > 0) {
              console.log("Custom Properties:", obj.userData);
              console.log(
                "Custom Properties [Keys]: ",
                Object.keys(obj.userData),
              );
            } else {
              console.log("Custom Properties: none");
            }
            console.groupEnd();
          }
        });
      };

      // Usage example (call in console):
      // printModelInfo(floors['l1']);  // Replace 'l1' with your floor or any Object3D
    </script>
  </body>
</html>
